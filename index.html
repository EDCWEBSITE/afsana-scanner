<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afsana 2026 Scanner</title>
  <link rel="stylesheet" href="scanner.css">
  <script src="https://cdn.jsdelivr.net/npm/jsqr/dist/jsQR.js"></script>
</head>
<body>
  <div class="container">
    <h1>Afsana 2026 QR Scanner</h1>
    <p>Scan student QR and mark attendance</p>

    <div class="card">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas" hidden></canvas>
      <div id="status">Camera not started</div>

      <div class="actions">
        <button id="startBtn">Start Scanner</button>
        <button id="stopBtn" disabled>Stop</button>
      </div>
    </div>

    <div class="card">
      <h3>Manual QR Input</h3>
      <input id="manualQr" type="text" placeholder="Paste QR value">
      <button id="manualVerifyBtn">Verify</button>
    </div>

    <div class="card">
      <h3>Result</h3>
      <pre id="resultBox">No scan yet</pre>
    </div>
  </div>

  <script src="scanner.js"></script>
</body>
</html>
